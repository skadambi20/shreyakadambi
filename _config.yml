# -----------------------------------------------------------------------------
# Blog — DISABLED
# -----------------------------------------------------------------------------

blog_name:
blog_nav_title:
blog_description:
permalink: /blog/:year/:title/

pagination:
  enabled: false

related_blog_posts:
  enabled: false
  max_related: 0

# Comments — disabled
giscus:
  repo:
disqus_shortname:
external_sources:

# -----------------------------------------------------------------------------
# Collections — only what's needed
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: false        # news disabled
    permalink: /news/:path/
  projects:
    output: false        # projects disabled
    permalink: /projects/:path/

announcements:
  enabled: false         # no news/announcements section

latest_posts:
  enabled: false         # no blog posts section

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ['_pages']
exclude:
  - bin
  - Gemfile
  - Gemfile.lock
  - vendor
keep_files:
  - CNAME
  - .nojekyll
  - .git

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jemoji

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Jekyll Minifier
# -----------------------------------------------------------------------------

jekyll-minifier:
  exclude: ['robots.txt']
  uglifier_args:
    harmony: true

# -----------------------------------------------------------------------------
# Jekyll Archives
# -----------------------------------------------------------------------------

jekyll-archives:
  enabled: []            # disable all archives (no blog)

display_tags: []
display_categories: []

# -----------------------------------------------------------------------------
# Jekyll Scholar — Publications
# -----------------------------------------------------------------------------

scholar:
  last_name: [Kadambi]
  first_name: [Shreya, S.]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: false
  dimensions: true

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website, preview, altmetric]

max_author_limit: 3
more_authors_animation_delay: 10
enable_publication_thumbnails: true

# -----------------------------------------------------------------------------
# Jekyll Link Attributes
# -----------------------------------------------------------------------------

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

# -----------------------------------------------------------------------------
# Responsive Images
# -----------------------------------------------------------------------------

imagemagick:
  enabled: false

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_analytics:    false
enable_cronitor_analytics:  false
enable_google_verification: false
enable_bing_verification:   false
enable_masonry:             false  # no projects
enable_math:                true
enable_tooltips:            false
enable_darkmode:            true
enable_navbar_social:       true   # show scholar/linkedin/github in navbar
enable_project_categories:  false  # no projects
enable_medium_zoom:         true
enable_progressbar:         false

